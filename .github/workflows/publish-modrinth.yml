name: Publish to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      changelog:
        description: Changelog for the Modrinth version
        required: true
        type: string
      version_type:
        description: Modrinth release channel
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Prepare changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          DISPATCH_CHANGELOG: ${{ inputs.changelog }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "$DISPATCH_CHANGELOG" > changelog.txt
          else
            printf '%s\n' "$RELEASE_BODY" > changelog.txt
          fi

          if [ -z "$(tr -d '[:space:]' < changelog.txt)" ]; then
            echo "Modrinth publish requires a non-empty changelog."
            exit 1
          fi

      - name: Publish version
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          VERSION_TYPE: ${{ inputs.version_type || 'release' }}
        run: |
          if [ -z "$MODRINTH_TOKEN" ] || [ -z "$MODRINTH_PROJECT_ID" ]; then
            echo "Missing MODRINTH_TOKEN or MODRINTH_PROJECT_ID secret."
            exit 1
          fi

          VERSION="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          JAR="target/goosesync-${VERSION}.jar"

          if [ ! -f "$JAR" ]; then
            echo "Expected jar not found: $JAR"
            exit 1
          fi

          jq -n \
            --arg name "GooseSync $VERSION" \
            --arg version_number "$VERSION" \
            --arg version_type "$VERSION_TYPE" \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            --rawfile changelog changelog.txt \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              version_type: $version_type,
              loaders: ["spigot", "paper", "purpur"],
              game_versions: ["1.16", "1.16.1", "1.16.2", "1.16.3", "1.16.4", "1.16.5", "1.17", "1.17.1", "1.18", "1.18.1", "1.18.2", "1.19", "1.19.1", "1.19.2", "1.19.3", "1.19.4", "1.20", "1.20.1", "1.20.2", "1.20.3", "1.20.4", "1.20.5", "1.20.6", "1.21", "1.21.1", "1.21.2"],
              featured: false,
              status: "listed",
              project_id: $project_id,
              file_parts: ["primary"],
              primary_file: "primary"
            }' > modrinth-version.json

          curl --fail-with-body \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "User-Agent: GooseSync GitHub Actions" \
            -F "data=@modrinth-version.json;type=application/json" \
            -F "primary=@${JAR};type=application/java-archive" \
            https://api.modrinth.com/v2/version
